<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>рҹ«§ Bubble Pop!</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: bold;
      font-style: normal;
    }

    body {
      background: linear-gradient(160deg, #1a1040 0%, #2d1b6e 50%, #12102a 100%);
      min-height: 100vh;
      color: #fff;
      overflow: hidden;
      user-select: none;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle, #fff 1px, transparent 1px),
        radial-gradient(circle, #fff 1px, transparent 1px);
      background-size: 120px 120px, 80px 80px;
      background-position: 0 0, 40px 60px;
      opacity: 0.08;
      pointer-events: none; z-index: 0;
    }

    /* в”Җв”Җ HUD в”Җв”Җ */
    .hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .home-btn {
      color: #cbb4ff;
      text-decoration: none;
      font-size: 1em;
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(203,180,255,0.3);
      transition: background 0.15s;
      white-space: nowrap;
    }
    .home-btn:hover { background: rgba(203,180,255,0.1); }

    .score-display { text-align: center; }
    .score-label { font-size: 0.7em; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase; }
    .score-value { font-size: 2.2em; color: #FFD700; line-height: 1; }

    .lives-display { font-size: 1.7em; letter-spacing: 3px; min-width: 90px; text-align: right; }

    /* в”Җв”Җ GAME AREA в”Җв”Җ */
    #game-area {
      position: fixed;
      left: 0; right: 0;
      top: 70px; bottom: 0;
      z-index: 1;
      overflow: hidden;
    }

    /* в”Җв”Җ BUBBLES в”Җв”Җ */
    .bubble {
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.06s;
      touch-action: none;
    }
    .bubble:hover  { transform: scale(1.05); }

    /* gloss shine */
    .bubble::before {
      content: '';
      position: absolute;
      top: 14%; left: 18%;
      width: 38%; height: 26%;
      background: rgba(255,255,255,0.45);
      border-radius: 50%;
      filter: blur(4px);
      pointer-events: none;
    }

    @keyframes popBurst {
      0%   { transform: scale(1);   opacity: 1; }
      40%  { transform: scale(3.2); opacity: 0.7; }
      100% { transform: scale(5.0); opacity: 0; }
    }
    .bubble.popping {
      animation: popBurst 0.22s ease-out forwards;
      pointer-events: none;
    }

    /* score float-up */
    .score-popup {
      position: absolute;
      font-size: 1.8em;
      color: #FFD700;
      text-shadow: 0 2px 10px rgba(0,0,0,0.9);
      pointer-events: none;
      z-index: 20;
      animation: floatUp 0.85s ease-out forwards;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0);    opacity: 1; }
      100% { transform: translateY(-90px); opacity: 0; }
    }

    /* в”Җв”Җ OVERLAYS в”Җв”Җ */
    .overlay {
      position: fixed; inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,5,30,0.88);
      backdrop-filter: blur(8px);
      text-align: center;
      gap: 22px;
      padding: 24px;
    }
    .overlay.hidden { display: none; }

    .overlay-title {
      font-size: clamp(2.4em, 9vw, 4.5em);
      background: linear-gradient(90deg, #FFD700, #FF9A00, #FF4E6A, #B44FFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 3px 10px rgba(0,0,0,0.5));
    }
    .overlay-sub  { font-size: 1.15em; color: #cbb4ff; max-width: 380px; line-height: 1.5; }
    .overlay-score { font-size: 3.2em; color: #FFD700; }

    .btn-big {
      font-size: 1.3em;
      padding: 16px 52px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      background: linear-gradient(145deg, #FFD700, #FF9A00);
      color: #1a1040;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 6px 24px rgba(255,180,0,0.4);
    }
    .btn-big:hover  { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(255,180,0,0.55); }
    .btn-big:active { transform: translateY(0); }

    /* level-up flash */
    .level-flash {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(2em, 7vw, 3.8em);
      color: #FFD700;
      text-shadow: 0 0 40px rgba(255,215,0,0.9), 0 0 80px rgba(255,180,0,0.5);
      z-index: 50;
      pointer-events: none;
      animation: lvlFlash 1.3s ease-in-out forwards;
    }
    @keyframes lvlFlash {
      0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.7); }
      25%  { opacity: 1; transform: translate(-50%,-50%) scale(1.05); }
      75%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%,-50%) scale(1); }
    }

    /* miss flash on screen edge */
    .miss-flash {
      position: fixed; inset: 0;
      background: rgba(255,50,50,0.18);
      pointer-events: none;
      z-index: 5;
      animation: missFlash 0.35s ease-out forwards;
    }
    @keyframes missFlash {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

<!-- HUD -->
<div class="hud">
  <a class="home-btn" href="index.html">вҶҗ All Games</a>
  <div class="score-display">
    <div class="score-label">Score</div>
    <div class="score-value" id="scoreDisplay">0</div>
  </div>
  <div class="lives-display" id="livesDisplay">вқӨпёҸвқӨпёҸвқӨпёҸ</div>
</div>

<!-- Game Area -->
<div id="game-area"></div>

<!-- Start Screen -->
<div class="overlay" id="startScreen">
  <div class="overlay-title">рҹ«§ Bubble Pop!</div>
  <div class="overlay-sub">Click the bubbles before they float away! Miss too many and it's game over.</div>
  <button class="btn-big" onclick="startGame()">в–¶ Play!</button>
</div>

<!-- Game Over Screen -->
<div class="overlay hidden" id="gameOverScreen">
  <div class="overlay-title">Game Over!</div>
  <div class="overlay-sub">Final Score</div>
  <div class="overlay-score" id="finalScore">0</div>
  <button class="btn-big" onclick="startGame()">в–¶ Play Again</button>
</div>

<script>
// в”Җв”Җ AUDIO в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function sndPop(size) {
  try {
    const ctx = getAudio();
    const freq = size > 95 ? 280 : size > 68 ? 420 : 580;
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.25, ctx.currentTime + 0.18);
    gain.gain.setValueAtTime(0.45, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
    osc.start(); osc.stop(ctx.currentTime + 0.22);
  } catch(e) {}
}

function sndMiss() {
  try {
    const ctx  = getAudio();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(160, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.28);
    gain.gain.setValueAtTime(0.22, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.28);
    osc.start(); osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

function sndLevelUp() {
  try {
    const ctx = getAudio();
    [523, 659, 784, 1047].forEach((f, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = f;
      const t = ctx.currentTime + i * 0.1;
      gain.gain.setValueAtTime(0.3, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      osc.start(t); osc.stop(t + 0.22);
    });
  } catch(e) {}
}

function sndGameOver() {
  try {
    const ctx = getAudio();
    [400, 340, 270, 210].forEach((f, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.value = f;
      const t = ctx.currentTime + i * 0.16;
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t); osc.stop(t + 0.32);
    });
  } catch(e) {}
}

// в”Җв”Җ CONSTANTS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const COLORS = [
  { bg: 'rgba(255,75,75,0.72)',   border: '#ff3333' },
  { bg: 'rgba(65,155,255,0.72)',  border: '#3388ff' },
  { bg: 'rgba(60,210,110,0.72)',  border: '#33cc66' },
  { bg: 'rgba(255,195,40,0.72)',  border: '#ffbb00' },
  { bg: 'rgba(195,75,255,0.72)',  border: '#bb33ff' },
  { bg: 'rgba(255,130,40,0.72)',  border: '#ff8800' },
  { bg: 'rgba(60,220,220,0.72)',  border: '#33cccc' },
  { bg: 'rgba(255,90,170,0.72)',  border: '#ff3399' },
];

const EMOJIS = ['вӯҗ','рҹҢҲ','рҹ’Һ','рҹҺү','рҹҢҹ','рҹ’«','рҹ”Ҙ','вқ„пёҸ','рҹҚҖ','рҹҺҲ','рҹҰӢ','рҹҢә','рҹҗё','рҹҰ„','рҹҚӯ','рҹҡҖ'];

// в”Җв”Җ STATE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let G = {
  score: 0, lives: 3, level: 1,
  running: false, bubbles: [], spawnTimer: null, nextId: 0,
  rafId: null, lastTime: 0,
};

const gameArea      = document.getElementById('game-area');
const scoreDisplay  = document.getElementById('scoreDisplay');
const livesDisplay  = document.getElementById('livesDisplay');
const finalScore    = document.getElementById('finalScore');

// в”Җв”Җ LEVEL CONFIG в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function levelCfg(lvl) {
  return {
    spawnMs:  Math.max(550, 1900 - (lvl - 1) * 160),
    maxBubs:  Math.min(14, 4 + lvl),
    spdMin:   0.9 + (lvl - 1) * 0.18,
    spdMax:   1.8 + (lvl - 1) * 0.28,
  };
}

function ptsForSize(sz) {
  return sz >= 95 ? 5 : sz >= 68 ? 15 : 30;
}

// в”Җв”Җ SPAWN в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function spawnBubble() {
  if (!G.running) return;
  const cfg = levelCfg(G.level);
  if (G.bubbles.length >= cfg.maxBubs) return;

  const id    = G.nextId++;
  const areaW = gameArea.clientWidth;
  const size  = 52 + Math.random() * 68;          // 52вҖ“120 px
  const x     = size / 2 + Math.random() * (areaW - size);
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  const emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
  const pts   = ptsForSize(size);
  const speed = cfg.spdMin + Math.random() * (cfg.spdMax - cfg.spdMin);
  const drift = (Math.random() - 0.5) * 0.5;

  const el = document.createElement('div');
  el.className = 'bubble';
  el.style.cssText = `
    width:${size}px; height:${size}px;
    left:${x - size/2}px; bottom:${-(size + 10)}px;
    font-size:${size * 0.36}px;
    background:${color.bg};
    border:3px solid ${color.border};
    box-shadow:0 0 ${size*0.28}px ${color.border}99,
               inset 0 0 ${size*0.18}px rgba(255,255,255,0.12);
  `;
  // no emoji вҖ” clean colored bubble
  el.addEventListener('pointerenter', e => { e.stopPropagation(); popBubble(id); });
  el.addEventListener('pointerdown',  e => { e.stopPropagation(); popBubble(id); });
  gameArea.appendChild(el);

  G.bubbles.push({ id, el, x, y: -(size + 10), size, speed, drift, pts });
}

// в”Җв”Җ POP в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function popBubble(id) {
  if (!G.running) return;
  const idx = G.bubbles.findIndex(b => b.id === id);
  if (idx === -1) return;
  const b = G.bubbles.splice(idx, 1)[0];

  sndPop(b.size);

  // floating score label
  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = '+' + b.pts;
  popup.style.left   = (parseFloat(b.el.style.left) + b.size / 2 - 22) + 'px';
  popup.style.bottom = b.el.style.bottom;
  gameArea.appendChild(popup);
  setTimeout(() => popup.remove(), 950);

  b.el.classList.add('popping');
  setTimeout(() => b.el.remove(), 260);

  G.score += b.pts;
  scoreDisplay.textContent = G.score;

  const newLvl = Math.floor(G.score / 120) + 1;
  if (newLvl > G.level) {
    G.level = newLvl;
    sndLevelUp();
    showLevelFlash();
    resetSpawnTimer();
  }
}

function showLevelFlash() {
  const el = document.createElement('div');
  el.className = 'level-flash';
  el.textContent = `в¬Ҷ Level ${G.level}!`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1400);
}

// в”Җв”Җ TICK в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function tick(ts) {
  if (!G.running) return;
  const dt = Math.min((ts - G.lastTime) / 16.67, 3);
  G.lastTime = ts;

  const areaW = gameArea.clientWidth;
  const areaH = gameArea.clientHeight;

  for (let i = G.bubbles.length - 1; i >= 0; i--) {
    const b = G.bubbles[i];
    b.y    += b.speed * dt;
    b.x    += b.drift * dt;
    b.x     = Math.max(b.size / 2, Math.min(areaW - b.size / 2, b.x));
    b.el.style.bottom = b.y + 'px';
    b.el.style.left   = (b.x - b.size / 2) + 'px';

    if (b.y > areaH + b.size) {
      b.el.remove();
      G.bubbles.splice(i, 1);
      missedBubble();
    }
  }

  G.rafId = requestAnimationFrame(tick);
}

// в”Җв”Җ MISS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function missedBubble() {
  if (!G.running) return;
  sndMiss();

  // red flash
  const flash = document.createElement('div');
  flash.className = 'miss-flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 380);

  G.lives--;
  livesDisplay.textContent = 'вқӨпёҸ'.repeat(Math.max(0, G.lives));
  if (G.lives <= 0) gameOver();
}

// в”Җв”Җ SPAWN TIMER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function resetSpawnTimer() {
  clearInterval(G.spawnTimer);
  G.spawnTimer = setInterval(spawnBubble, levelCfg(G.level).spawnMs);
}

// в”Җв”Җ START / GAME OVER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function startGame() {
  cancelAnimationFrame(G.rafId);
  clearInterval(G.spawnTimer);
  gameArea.innerHTML = '';

  G = { score:0, lives:3, level:1, running:true, bubbles:[], spawnTimer:null, nextId:0, rafId:null, lastTime:performance.now() };

  scoreDisplay.textContent = '0';
  livesDisplay.textContent = 'вқӨпёҸвқӨпёҸвқӨпёҸ';

  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');

  resetSpawnTimer();
  G.rafId = requestAnimationFrame(tick);
}

function gameOver() {
  G.running = false;
  clearInterval(G.spawnTimer);
  cancelAnimationFrame(G.rafId);
  sndGameOver();

  setTimeout(() => {
    gameArea.innerHTML = '';
    G.bubbles = [];
    finalScore.textContent = G.score;
    document.getElementById('gameOverScreen').classList.remove('hidden');
  }, 700);
}
</script>
</body>
</html>
